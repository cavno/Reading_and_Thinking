 <g class="corner ${triOn("B")?"":"off"}"><circle cx="${tx}" cy="${ty+64}" r="13" fill="var(--gold)"/><text x="${tx}" y="${ty+68.5}" font-size="12" text-anchor="middle" fill="#fff" font-weight="700">B</text></g>
 <g class="corner ${triOn("C")?"":"off"}"><circle cx="${tx+124}" cy="${ty+64}" r="13" fill="var(--pur)"/><text x="${tx+124}" y="${ty+68.5}" font-size="12" text-anchor="middle" fill="#fff" font-weight="700">C</text></g></g>`;
 /* 存量：张力 / 棘轮 / 确定性 */
 s+=tank(W-236,352,62,110,Tv,"#a73e2c","张力 T","T");
 s+=tank(W-152,352,62,110,Kv,"#3f7a52","棘轮 K","K");
 s+=tank(W-320,352,62,110,Cv,"#1d4e5f","储备 C","Cs");
 /* 流与回路 */
 s+=`<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="var(--grey)"/></marker>
 <marker id="arR" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7e2d1f"/></marker></defs>`;
 s+=`<path class="flow" d="M${qx+150},${qy+26} C${W/2-60},${qy+26} ${W/2-40},150 ${ax+40},148" marker-end="url(#ar)"/>`;/* audit->anchor 正常审计 */
 s+=`<path class="flow" d="M${ax+210},148 C${rx-30},150 ${rx-10},${qy+10} ${rx+6},${qy+16}" marker-end="url(#ar)"/>`;/* anchor缺口->登记簿 */
 s+=`<path class="flow" d="M${rx+70},${qy+52} C${rx+40},300 ${sx+170},${sy+10} ${sx+160},${sy+18}" marker-end="url(#ar)"/>`;/* 登记簿->策略 */
 s+=`<path class="flow" d="M${sx},${sy+25} C${qx+120},${sy+20} ${qx+90},${qy+70} ${qx+80},${qy+54}" marker-end="url(#ar)"/>`;/* 策略->审计(再检) */
 /* 自指回路（审计→支点自身） */
 s+=`<path class="floop selfloop ${["前515","1714"].includes(e.y)||e.blast?"armed":""}" d="M${qx+40},${qy} C60,120 ${ax-70},${ay+10} ${ax+4},${ay+22}" marker-end="url(#arR)"/>`;
 s+=`<text x="72" y="150" font-size="10.5" fill="#7e2d1f" font-family="var(--serif)">自指回路：审计标准审计自身${e.blast?"（闭合！）":""}</text>`;
 /* 回路标签 */
 s+=`<text x="${W/2}" y="278" font-size="10.5" fill="var(--fade)" text-anchor="middle">R1 增强回路：追问→对立→更多追问　｜　B1 调节回路：张力→缝合→泄压(留残差)</text>`;

function chart(){
 const cw=el("ch").clientWidth||900,chh=140,pad=34;
 const xs=i=>pad+i*(cw-pad-14)/(EV.length-1), ys=v=>12+(100-v)*(chh-34)/100;
 const line=(key,col)=>{let d="";EV.forEach((e,i)=>{d+=(i?"L":"M")+xs(i)+","+ys(e[key])});return `<path d="${d}" fill="none" stroke="${col}" stroke-width="2" opacity=".85"/>`};
 let s=`<text x="${pad}" y="11" font-size="10" fill="var(--fade)" font-family="var(--serif)">发展轨迹 · 存量曲线</text>`;
 s+=line("C","#1d4e5f")+line("T","#a73e2c")+line("K","#3f7a52");
 EV.forEach((e,i)=>{ if(e.blast) s+=`<line x1="${xs(i)}" y1="12" x2="${xs(i)}" y2="${chh-22}" stroke="#7e2d1f" stroke-dasharray="3 3" opacity=".6"/><text x="${xs(i)}" y="${chh-10}" font-size="9.5" fill="#7e2d1f" text-anchor="middle">爆点</text>`;});
 s+=`<line x1="${xs(cur)}" y1="12" x2="${xs(cur)}" y2="${chh-22}" stroke="#1c1916" stroke-width="1.6"/>`;
 s+=`<circle cx="${xs(cur)}" cy="${ys(EV[cur].C)}" r="3.5" fill="#1d4e5f"/><circle cx="${xs(cur)}" cy="${ys(EV[cur].T)}" r="3.5" fill="#a73e2c"/><circle cx="${xs(cur)}" cy="${ys(EV[cur].K)}" r="3.5" fill="#3f7a52"/>`;
 s+=`<g font-size="10" font-family="var(--serif)"><rect x="${cw-208}" y="6" width="200" height="16" fill="var(--pl)" opacity=".8"/><text x="${cw-200}" y="18" fill="#1d4e5f">■ 确定性C</text><text x="${cw-134}" y="18" fill="#a73e2c">■ 张力T</text><text x="${cw-76}" y="18" fill="#3f7a52">■ 棘轮K</text></g>`;
 el("ch").innerHTML=s;
}

 <div class="p-name">${e.name}</div><div class="p-era">${e.y} ｜ 支点：${e.anchor} ｜ 三角保留：${e.tri.split("").join("·")}</div>

const EXPL={
 anchor:["要素 · 支点/担保人","系统的核心元件：为一切信念供给最终理由的终点。它历经四站搬迁——本原(世界之内)→神(世界之上)→先验形式(主体之内)→形式系统(语言之内)。每站的失败方式不同，失败位置相同：自我担保处。当前状态见图中标签。"],
 audit:["要素 · 审计引擎","系统的动力兼故障源：苏格拉底诘问与充足理由律的合体——任何主张须给出理由。对外审计产生知识；对支点自身审计(红色虚线闭合)即触发自爆。它不可拆除：拆了它系统退回神话。"],
 reg:["要素 · 对立应力登记簿","41 组二元对立＝系统的张力源与燃料舱。每组对立记录一处「奠基失败的应力点」；张力驱动追问(R1)，追问逼出缝合(B1)。对立不是故障清单，是动力清单——无张力则系统停转。"],
 strat:["要素 · 缝合策略库","六格策略空间：S1特许豁免(神=自因) / S2分层外包(类型论·元语言) / S3域限制(康德) / S4降格(可错论) / S5治疗解散(维特根斯坦) / S6矛盾本体化(黑格尔)。历史按让步幅度递增的顺序取用；到二十世纪已穷举，再无第七格。"],
 tri:["约束 · 不可能三角","A 普遍必然性 / B 彻底可审计性 / C 自我完备性——两两可得，三者不可兼(阿格里帕三难即其证明)。系统必须弃一角方可运行：中世纪外包B，独断论弃B，怀疑论弃A，康德自愿弃C。图中变灰的角＝当前被弃之角。"],
 T:["存量 · 二元张力 T","未解对立的累积应力。它是**动力**：T 升高驱动追问与创新；T 过载触发缝合或自爆。注意两次爆点前 T 都在高位而 C 也在高位——独断的稳定孕育不稳定(明斯基结构)。"],
 K:["存量 · 边界知识 K(棘轮)","关于「什么不可能」的知识存量——只增不减：三难清单、Γ卷立法、休谟之叉、康德边界声明、哥德尔定理逐次入库。它是系统真正的进步栏：答案栏两千年空转，约束栏单调爬升，1931 年触顶＝边界本身定理化。"],
 Cs:["存量 · 确定性储备 C","当前支点的担保能力/合法性。两次崩落(爆点)、一次高位建制(神)、一次有界回升(康德)。终态不是满格而是**有界稳态**：不再追求无限兜底，改为可行解＋不可达域证明。"],
};
function explain(k){const x=EXPL[k];if(!x)return;
 el("panel").innerHTML=`<div class="eyebrow">系统件解剖</div><div class="p-name" style="font-size:19px">${x[0]}</div>
 <div class="blk" style="margin-top:10px"><h4>机理</h4>${x[1]}</div>
 <div class="blk act"><h4>返回</h4>点时间轴任一事件或「上一步/下一步」继续演化；▶ 演化 自动播放全程。</div>`;}
function go(i){cur=Math.max(0,Math.min(EV.length-1,i));
 document.querySelectorAll(".tk").forEach((t,j)=>t.classList.toggle("cur",j===cur));
 diagram();chart();panelEvent();
 const tk=document.querySelector(".tk.cur");if(tk)tk.scrollIntoView({inline:"center",behavior:"smooth",block:"nearest"});}
function play(){if(timer){stop();return}el("bPlay").classList.add("on");el("bPlay").textContent="⏸ 暂停";
 timer=setInterval(()=>{if(cur>=EV.length-1){stop();return}go(cur+1)},2100);}

function guide(){el("panel").innerHTML=`<div class="guide"><div class="eyebrow">导读 · LECTORI</div><h3>把 Logos 当一台系统动力学机器</h3>
<p><strong>要素</strong>：支点(担保人)、审计引擎(PSR/诘问)、对立应力登记簿(41 组＝张力源)、缝合策略库(S1–S6)。<strong>约束</strong>：不可能三角 A/B/C——弃一角方可运行，变灰的角＝当前被弃。<strong>边界</strong>：蓝色虚线框，随三块界碑(可思→可认识→可说)逐档收缩——收缩是校准不是败退。</p>
<p><strong>动力与故障</strong>：R1 增强回路(追问→对立→更多追问)供给燃料；B1 调节回路(张力→缝合→泄压)维持运转；<em>红色虚线自指回路</em>(审计标准审计自身)是唯一致命故障——两次闭合＝两次爆点(巴门尼德/休谟)，图中支点会闪烁。</p>
<p><strong>轨迹</strong>(底部曲线)：确定性 C 两崩一建制一有界回升；张力 T 是锯齿(燃料而非病)；<em>棘轮 K 只增不减</em>——系统的真实进步不在答案栏，在约束栏，1931 年触顶＝边界定理化。</p>
<p class="mini">操作：▶ 演化＝自动播放 18 步；点时间轴任意事件跳转；<strong>点图中任一系统件</strong>(支点/审计引擎/登记簿/策略库/三角/三个储罐)看它的机理解剖。注意两处「明斯基前夜」：爆点前 C 与 T 同时高位——独断的稳定孕育不稳定。</p></div>`;}
buildTL();go(0);guide();
el("bPlay").addEventListener("click",play);
el("bPrev").addEventListener("click",()=>{stop();go(cur-1)});
