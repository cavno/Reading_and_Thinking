function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')}

function build(){
 const rail=document.getElementById('rail');let h='';
 ARC.forEach(st=>{
  h+=`<div class="station" data-st="${st.id}">`;

  h+=`<div class="st-line">${bold(st.line)}</div>`;

   h+=`<div class="grp"><div class="grp-h ${g.blast?'blast':''}">${esc(g.h)}</div>`;
   if(g.blast)h+=`<div class="blastband" data-bb="${st.id}-${gi}"><span class="bb-t">☄ 自爆机制</span>　<span class="bb-s">${esc(g.bb)}</span></div>`;
   h+=`<div class="chips">${g.ids.map(id=>`<span class="chip ${g.hot===id?'hot':''}" data-id="${id}"><b>${id.toUpperCase()}</b>${OPP[id][0]}</span>`).join('')}</div></div>`;
  });
  if(st.weld)h+=`<div class="weld">${bold(st.weld)}</div>`;
  h+=`</div>`;
 });
 rail.innerHTML=h;

 rail.querySelectorAll('.blastband').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();}));
}

function guide(){document.getElementById('panel').innerHTML=`<div class="guide"><div class="eyebrow">导读 · LECTORI</div><h3>一部搬家史，两次自爆</h3>
<p><strong>纵轴＝确定性支点的四个地址</strong>：世界之内（本原）→世界之上（神＝唯一持照自因）→主体之内（先验形式）→语言与逻辑（边界定理化，预告）。左侧里程碑是总纲线：<em>可思→可认识→可说</em>。</p>
