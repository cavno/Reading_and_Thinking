<style>

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--parchment);

.greek{font-family:var(--greek);}
.app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;}

header{flex:none;border-bottom:1px solid var(--line);background:rgba(243,235,218,.92);backdrop-filter:blur(8px);padding:13px 24px 10px;}

h1{font-family:var(--display);font-weight:600;font-size:23px;white-space:nowrap;}
.latin{font-family:var(--greek);font-size:12px;letter-spacing:.18em;color:var(--terracotta);text-transform:uppercase;}
.sub{font-size:12.5px;color:var(--ink-fade);}
.tools{margin-left:auto;display:flex;gap:8px;}
.btn{font-size:13px;color:var(--ink-soft);background:var(--parchment-light);border:1px solid var(--line-strong);border-radius:18px;padding:5px 14px;cursor:pointer;white-space:nowrap;transition:all .2s;}

.main{flex:1;display:flex;min-height:0;}
.mapwrap{flex:1;overflow:auto;padding:8px 0 60px;}
.mapwrap svg{display:block;margin:0 auto;}
.panel{width:392px;flex:none;border-left:1px solid var(--line);background:var(--parchment-light);overflow-y:auto;padding:20px 22px 50px;}

.phaseband{fill:rgba(29,78,95,.03);}
.phaselab{fill:var(--ink-fade);font-family:var(--greek);letter-spacing:.14em;text-transform:uppercase;}
.phaseroman{fill:var(--terracotta);font-family:var(--display);font-weight:600;opacity:.5;}

.node{cursor:pointer;}
.node rect{transition:opacity .2s,stroke-width .15s;}
.node:hover .nbox{stroke:var(--terracotta);}
.nbox{stroke-width:1.2;}
.n-no{fill:#fff;font-family:var(--mono);font-weight:700;}
.n-cn{fill:var(--ink);font-family:var(--serif);font-weight:600;}

.n-role{font-family:var(--serif);font-weight:500;}

.flow.cure{stroke:var(--green);}
.flow.ext{stroke:var(--grey);stroke-dasharray:6 5;}

.flowhead.cure{fill:var(--green);}
.flowhead.ext{fill:var(--grey);}

.edgelab .em{font-weight:600;}
.elab-harm{fill:var(--terracotta-dark);}
.elab-cure{fill:var(--green);}
.elab-bg{fill:var(--parchment-light);opacity:.86;}

.dimE{stroke-opacity:.06 !important;}

.node.sel .nbox{stroke:var(--terracotta);stroke-width:2.6;}
.node.hl .nbox{stroke-width:2.2;}

.blk.did{background:rgba(63,122,82,.09);border-left:3px solid var(--green);}
.blk.out{background:rgba(28,25,22,.05);border-left:3px solid var(--ink-fade);}

.blk.in h4{color:var(--terracotta);} .blk.did h4{color:var(--green);} .blk.out h4{color:var(--ink-fade);}
.blk .none{color:var(--ink-fade);font-style:italic;}
.nav{display:flex;gap:8px;margin-top:14px;}
.nav .b{flex:1;text-align:center;font-size:12.5px;color:var(--ink-soft);background:var(--parchment);border:1px solid var(--line-strong);border-radius:16px;padding:6px 0;cursor:pointer;}
.nav .b:hover{border-color:var(--terracotta);color:var(--terracotta);}
.nav .b.dis{opacity:.35;pointer-events:none;}
.guide h3{font-family:var(--display);font-size:20px;font-weight:600;margin-bottom:10px;color:var(--ink);}
.guide p{font-size:13.5px;line-height:1.74;margin-bottom:10px;color:var(--ink-soft);}

.guide .k b{color:var(--terracotta);font-family:var(--mono);flex:none;}

@media(max-width:980px){
  body{overflow:auto;} .app{height:auto;} .main{flex-direction:column;}

  .mapwrap{overflow:visible;}

 {roman:'Ⅱ',lab:'宇宙论 · 本原之墙',ids:['o3','o4']},
 {roman:'Ⅲ',lab:'巴门尼德引擎',ids:['o6','o7','o5']},
 {roman:'Ⅳ',lab:'缝合手术 · 柏拉图与亚里士多德',ids:['o11','o12','o10','o8','o9']},
 {roman:'Ⅴ',lab:'希腊化 · 伦理学重演',ids:['o13','o14','o15','o16']},
];

/* ===== 布局：单列竖链 ===== */
const W=900, CX=W*0.44, NODEW=326, NODEH=62, VGAP=64, TOP=44, LABW=W-(CX+NODEW/2)-24;
const box={};
let cy=TOP; const phaseRects=[];
PHASES.forEach(ph=>{
  const top=cy-14;
  ph.ids.forEach(id=>{ box[id]={x:CX-NODEW/2,y:cy,w:NODEW,h:NODEH,cx:CX,cy:cy+NODEH/2}; cy+=NODEH+VGAP; });
  phaseRects.push({top,bottom:cy-VGAP+8,roman:ph.roman,lab:ph.lab});
});
const VBH=cy-VGAP+40;

function down(a,b){ // vertical connector a.bottom -> b.top with label
  return {x1:a.cx,y1:a.y+a.h,x2:b.cx,y2:b.y,my:(a.y+a.h+b.y)/2};
}
function backPath(f,t){ // curved arrow on the RIGHT, from node f up to earlier node t
  const a=box[f],b=box[t];
  const sx=a.x+a.w, sy=a.cy, tx=b.x+b.w, ty=b.cy;
  const bow=Math.max(sx,tx)+70+ (f==='o13'?46:0);
  return `M${sx},${sy} C${bow},${sy} ${bow},${ty} ${tx},${ty}`;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}

function buildMap(){
  const svg=document.getElementById('map');
  svg.setAttribute('viewBox',`0 0 ${W} ${VBH}`);svg.setAttribute('width',W);svg.setAttribute('height',VBH);
  let defs=`<defs>
    <marker id="ah-harm" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" class="flowhead harm"/></marker>
    <marker id="ah-cure" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" class="flowhead cure"/></marker>
    <marker id="ah-ext" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" class="flowhead ext"/></marker>
  </defs>`;
  let bg='',flows='',backs='',nodes='';
  // phase bands + labels
  phaseRects.forEach((p,i)=>{
    if(i%2===0) bg+=`<rect class="phaseband" x="6" y="${p.top}" width="${W-12}" height="${p.bottom-p.top}" rx="12"/>`;
    bg+=`<text class="phaseroman" x="26" y="${p.top+30}" font-size="30">${p.roman}</text>`;
    bg+=`<text class="phaselab" x="60" y="${p.top+22}" font-size="11.5">${p.lab}</text>`;
  });
  // main vertical flows + edge labels
  E.forEach(([f,t,k,lab])=>{
    const a=box[f],b=box[t],d=down(a,b);
    flows+=`<path class="flow ${k}" data-f="${f}" data-t="${t}" d="M${d.x1},${d.y1} L${d.x2},${d.y2}" stroke-width="2.2" stroke-opacity="0.85" marker-end="url(#ah-${k})"/>`;
    // label with bg
    const labX=d.x1+16, labY=d.my+4;
    const wsize=lab.length*13+16;
    flows+=`<g class="edgelab" data-f="${f}" data-t="${t}"><rect class="elab-bg" x="${labX-6}" y="${labY-15}" width="${wsize}" height="21" rx="5"/><text class="${k==='cure'?'elab-cure':'elab-harm'}" x="${labX}" y="${labY}" font-size="13">${k==='cure'?'▸ 药：':(k==='ext'?'▸ ':'▸ 病：')}${esc(lab)}</text></g>`;
  });
  // back arrows (right side)
  BACK.forEach(([f,t,k,lab])=>{
    backs+=`<path class="flow ${k}" data-back="1" data-f="${f}" data-t="${t}" d="${backPath(f,t)}" stroke-width="1.8" stroke-opacity="0.7" marker-end="url(#ah-${k})"/>`;
    const a=box[f],b=box[t];
    const midY=(a.cy+b.cy)/2, x=Math.max(a.x+a.w,b.x+b.w)+70+(f==='o13'?46:0)+6;
    backs+=`<g class="edgelab" data-back="1" data-f="${f}" data-t="${t}"><text class="${k==='cure'?'elab-cure':'elab-harm'}" x="${x}" y="${midY+4}" font-size="12" transform="rotate(90 ${x} ${midY})" text-anchor="middle">${esc(lab)}</text></g>`;
  });
  // nodes
  N.forEach(n=>{
    const b=box[n.id],col=FAM[n.fam].c;
    let g=`<rect class="nbox" x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}" rx="10" fill="var(--parchment-light)" stroke="${col}"/>`;
    g+=`<rect x="${b.x}" y="${b.y}" width="6" height="${b.h}" rx="3" fill="${col}"/>`;
    g+=`<rect x="${b.x+16}" y="${b.y+b.h/2-13}" width="34" height="26" rx="6" fill="${col}"/>`;
    g+=`<text class="n-no" x="${b.x+33}" y="${b.y+b.h/2+5}" font-size="13" text-anchor="middle">${n.no}</text>`;
    g+=`<text class="n-cn" x="${b.x+60}" y="${b.y+26}" font-size="16.5">${n.cn}</text>`;
    g+=`<text class="n-gk" x="${b.x+60}" y="${b.y+45}" font-size="12">${n.gk}</text>`;
    g+=`<text class="n-role" x="${b.x+b.w-14}" y="${b.y+b.h/2+4.5}" font-size="12.5" text-anchor="end" fill="${col}">${n.role}</text>`;
    nodes+=`<g class="node" data-id="${n.id}" tabindex="0"><title>${n.cn}｜${n.role}</title>${g}</g>`;
  });
  svg.innerHTML=defs+bg+flows+backs+nodes;
  svg.querySelectorAll('.node').forEach(nd=>nd.addEventListener('click',()=>select(nd.dataset.id)));
  svg.querySelectorAll('.node').forEach(nd=>nd.addEventListener('keydown',e=>{if(e.key==='Enter')select(nd.dataset.id);}));
}

/* ===== 交互 ===== */
let selected=null;
function svg(){return document.getElementById('map');}
function relEdges(id){
  const s=new Set();
  svg().querySelectorAll('.flow').forEach(e=>{ if(e.dataset.f===id||e.dataset.t===id) s.add(e); });
  return s;
}
function applySel(id){
  const nb=new Set([id]);
  [...E,...BACK].forEach(([f,t])=>{ if(f===id)nb.add(t); if(t===id)nb.add(f); });
  svg().querySelectorAll('.node').forEach(n=>{ n.classList.remove('dim','hl','sel');
    if(n.dataset.id===id)n.classList.add('sel'); else if(nb.has(n.dataset.id))n.classList.add('hl'); else n.classList.add('dim'); });
  svg().querySelectorAll('.flow').forEach(e=>{ const on=e.dataset.f===id||e.dataset.t===id; e.classList.toggle('hlE',on); e.classList.toggle('dimE',!on); });
  svg().querySelectorAll('.edgelab').forEach(l=>{ const on=l.dataset.f===id||l.dataset.t===id; l.classList.toggle('dimL',!on); });
}
function clearSel(){
  svg().querySelectorAll('.node').forEach(n=>n.classList.remove('dim','hl','sel'));
  svg().querySelectorAll('.flow').forEach(e=>e.classList.remove('hlE','dimE'));
  svg().querySelectorAll('.edgelab').forEach(l=>l.classList.remove('dimL'));
}
function panelFor(id){
  const n=N_BY[id],col=FAM[n.fam].c,idx=n.i;
  const prev=idx>0?N[idx-1]:null, next=idx<N.length-1?N[idx+1]:null;
  document.getElementById('panel').innerHTML=`
   <div class="eyebrow">${FAM[n.fam].lab} · 第 ${idx+1} / 16 环</div>
   <span class="p-no" style="background:${col}">N° ${n.no}</span>
   <div class="p-name">${n.cn}</div>
   <div class="p-gk greek">${n.gk}</div>
   <div class="p-who">${n.who}　·　角色：<b style="color:${col}">${n.role}</b></div>
   <div class="blk in"><h4>← 它要收拾的洞（上一步留下的病）</h4>${n.in?esc0(n.in):'<span class="none">无——这是整条链的第一推动，不为收拾任何洞而生。</span>'}</div>
   <div class="blk did"><h4>▸ 它做了什么（药 · 填补）</h4>${esc0(n.did)}</div>
   <div class="blk out"><h4>→ 它凿开的新洞（病 · 传给下一步）</h4>${esc0(n.out)}</div>
   <div class="nav">
     <div class="b ${prev?'':'dis'}" onclick="window.__sel('${prev?prev.id:''}')">‹ 上一环</div>
     <div class="b" onclick="window.__reset()">全览</div>
     <div class="b ${next?'':'dis'}" onclick="window.__sel('${next?next.id:''}')">下一环 ›</div>
   </div>`;
}
function esc0(s){return s;}
function select(id){ if(!id)return; selected=id; exitPlay(); applySel(id); panelFor(id); scrollTo(id); }
function scrollTo(id){ const b=box[id]; if(!b)return; const wrap=document.querySelector('.mapwrap'); const sc=svg().getBoundingClientRect().height/VBH; wrap.scrollTo({top:Math.max(0,b.y*sc-wrap.clientHeight/2+40),behavior:'smooth'}); }
window.__sel=select; window.__reset=reset;

function guide(){
  document.getElementById('panel').innerHTML=`<div class="guide">
   <div class="eyebrow">导读 · LECTORI</div>
   <h3>一条被逼出来的因果链</h3>
   <p>这16组不是一张目录，而是<strong>一台连锁机器</strong>：每一组都是为了收拾<em>上一组留下的洞</em>才出现，堵上之后又<em>恰好凿开下一个洞</em>。竖看是时间顺序，箭头上的标签是传导的"病"与"药"。</p>
   <div class="k"><b>红</b>「病」：这一步凿开、并逼出下一步的新缺口。</div>
   <div class="k"><b>绿</b>「药」：这一步精确堵上的那个洞。</div>
   <div class="k"><b>灰虚线</b>：外部冲击（城邦崩溃）或"同一事的重演"。</div>
   <p class="mini" style="margin-top:8px">右侧的弯箭头是<strong>回指</strong>——某步的"药"往回堵向更早的那个洞：形式/质料(08)回堵共相(10)、潜能/现实(09)回堵变化(07)、灵魂/肉体(15)重演两世界(12)、必然/自由(13)下沉自决定论(07)。</p>
   <p class="mini">点任一环：读它"收拾了什么洞 / 做了什么 / 又凿开什么洞"，并可逐环上下走。或按<strong>▶ 顺链演示</strong>从"开机"看到"认命"。</p>
   <p class="mini" style="border-top:1px solid var(--line);padding-top:9px">首尾咬合：<strong>01 让 Logos 开机，16 让 Logos 认命</strong>。中间的巴门尼德引擎(06→07)制造了那道贯穿全链的伤口，其余各组都是不同的缝合手术。删掉任一环，后面的问题就失去由来——这正是它们作为整体沉淀下来的原因。</p>
  </div>`;
}
function reset(){ selected=null; exitPlay(); clearSel(); guide(); document.querySelector('.mapwrap').scrollTo({top:0,behavior:'smooth'}); }

/* 顺链演示 */
let playing=false,pt=null,pk=0;
function play(){
  playing=true;pk=0;document.getElementById('btnPlay').classList.add('on');
  step();
  pt=setInterval(()=>{ pk++; if(pk>=N.length){exitPlay();return;} step(); },1700);
}
function step(){ const n=N[pk]; applySel(n.id); panelFor(n.id); scrollTo(n.id); }
function exitPlay(){ if(pt){clearInterval(pt);pt=null;} if(playing){playing=false;document.getElementById('btnPlay').classList.remove('on');} }

buildMap(); guide();
document.getElementById('btnPlay').addEventListener('click',()=>{ if(playing)exitPlay(); else play(); });
document.getElementById('btnReset').addEventListener('click',reset);
</script>
