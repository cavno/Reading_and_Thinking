<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>悖论图谱 · An Atlas of Paradoxes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Background — subtle warm darks, less harsh than pure black */
    --ink: #14140f;            /* base, slightly warm */
    --ink-2: #1a1a14;          /* card / sidebar */
    --ink-3: #232319;          /* lifted */
    --ink-card: #1c1c15;
    --ink-overlay: rgba(20,20,15,0.94);

    /* Foreground — warm off-whites, much higher contrast for reading */
    --paper: #f0e9d8;          /* primary headings */
    --paper-prose: #e2d8c0;    /* body text — was #b8ad94, now significantly higher contrast */
    --paper-dim: #b6ad96;      /* secondary / metadata */
    --paper-dark: #7d745f;     /* tertiary */
    --paper-darker: #58513f;   /* quaternary, dividers */

    /* Accents — used sparingly */
    --cinnabar: #d8533c;       /* slightly brighter for contrast */
    --cinnabar-dim: #9b3520;
    --jade: #7ba593;
    --jade-bright: #afd3c2;    /* brightened for contrast */
    --gold: #d4b070;           /* slightly brightened */
    --gold-dim: #9a7c44;
    --gold-deep: #6b5530;

    /* Lines & shadows */
    --line: rgba(240,233,216,0.10);
    --line-strong: rgba(240,233,216,0.22);
    --line-warm: rgba(212,176,112,0.18);
    --shadow: rgba(0,0,0,0.55);
    --shadow-soft: rgba(0,0,0,0.35);

    /* Reading width — capped at the optimal Chinese reading line length
       (~32–35 characters per line at our body font size) */
    --reading-width: 720px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--ink);
    color: var(--paper);
    /* Refined Chinese-first font stack: prefer high-quality system Ming/Song fonts when available,
       fall back to Noto Serif SC. PingFang for sans-serif mixing is reserved for UI labels only. */
    font-family: "Source Han Serif SC", "Source Han Serif CN", "Noto Serif SC",
                 "Songti SC", "STSong", "SimSun", "Cormorant Garamond", serif;
    font-weight: 400;
    line-height: 1.75;
    font-feature-settings: "palt", "kern";
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  body {
    /* Removed harsh radial gradients; the background is now calm and warm-dark */
    background: linear-gradient(180deg, #14140f 0%, #100f0c 100%);
    min-height: 100vh;
  }

  /* Very subtle grain — reduced opacity to not interfere with text contrast */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.18;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(240,233,216,0.02) 1px, transparent 0);
    background-size: 4px 4px;
  }

  /* Selection styling for elegance */
  ::selection {
    background: rgba(216,83,60,0.35);
    color: var(--paper);
  }
  ::-moz-selection {
    background: rgba(216,83,60,0.35);
    color: var(--paper);
  }

  /* ========== HEADER ========== */
  header.masthead {
    padding: 30px 56px 26px;
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--ink-overlay);
    backdrop-filter: blur(16px);
  }

  .masthead-inner {
    max-width: 1700px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 60px;
    align-items: center;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .brand-mark {
    display: flex;
    align-items: baseline;
    gap: 14px;
    font-family: "Cinzel", serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--cinnabar);
    text-transform: uppercase;
    font-weight: 500;
  }
  .brand-mark::before, .brand-mark::after {
    content: '';
    width: 18px;
    height: 1px;
    background: var(--cinnabar-dim);
    align-self: center;
  }
  .brand-title {
    font-size: 30px;
    color: var(--paper);
    letter-spacing: 0.06em;
    font-weight: 600;
    line-height: 1.2;
  }
  .brand-sub {
    font-family: "Cormorant Garamond", "Source Han Serif SC", serif;
    font-style: italic;
    font-size: 13px;
    color: var(--paper-dark);
    letter-spacing: 0.06em;
    margin-top: 3px;
  }

  /* Center: dynamic info */
  .nowshowing {
    text-align: center;
    color: var(--paper-prose);
  }
  .ns-cat {
    font-family: "Cinzel", serif;
    font-size: 9px;
    letter-spacing: 0.42em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 7px;
    font-weight: 500;
  }
  .ns-poles {
    font-size: 16px;
    color: var(--paper);
    letter-spacing: 0.04em;
    line-height: 1.5;
  }
  .ns-poles .pa { color: var(--jade-bright); font-weight: 500; }
  .ns-poles .pb { color: var(--cinnabar); font-weight: 500; }
  .ns-poles .vs {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    color: var(--paper-dark);
    margin: 0 14px;
    font-weight: 500;
  }

  /* Right: counts */
  .counts {
    display: flex;
    gap: 36px;
    align-items: center;
  }
  .count-block {
    text-align: center;
  }
  .count-num {
    font-family: "Cormorant Garamond", serif;
    font-size: 30px;
    color: var(--paper);
    line-height: 1;
    font-weight: 500;
  }
  .count-label {
    font-family: "Cinzel", serif;
    font-size: 8px;
    letter-spacing: 0.4em;
    color: var(--paper-dark);
    text-transform: uppercase;
    margin-top: 8px;
    font-weight: 500;
  }

  /* ========== MAIN LAYOUT ========== */
  main {
    display: grid;
    grid-template-columns: 280px 1fr;
    max-width: 1700px;
    margin: 0 auto;
    min-height: calc(100vh - 96px);
    gap: 0;
  }

  /* ========== SIDEBAR (CATEGORY-BASED) ========== */
  aside.sidebar {
    border-right: 1px solid var(--line);
    padding: 36px 0 36px 56px;
    background: rgba(20,20,15,0.4);
  }

  .nav-label {
    font-family: "Cinzel", serif;
    font-size: 9px;
    letter-spacing: 0.42em;
    color: var(--paper-dark);
    text-transform: uppercase;
    margin-bottom: 26px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
    padding-right: 36px;
    font-weight: 500;
  }

  .cat-group {
    margin-bottom: 4px;
  }
  .cat-header {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 11px 36px 11px 0;
    cursor: pointer;
    transition: all 0.3s;
    user-select: none;
  }
  .cat-header:hover .cat-name {
    color: var(--paper);
  }
  .cat-marker {
    width: 18px;
    height: 1px;
    background: var(--paper-darker);
    transition: all 0.3s;
    flex-shrink: 0;
  }
  .cat-group.open .cat-marker,
  .cat-header:hover .cat-marker {
    background: var(--gold);
    width: 22px;
  }
  .cat-name {
    flex: 1;
    font-size: 14px;
    color: var(--paper-prose);
    letter-spacing: 0.06em;
    transition: color 0.3s;
    font-weight: 500;
  }
  .cat-count {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 13px;
    color: var(--paper-darker);
  }
  .cat-toggle {
    color: var(--paper-darker);
    font-family: "Cormorant Garamond", serif;
    font-size: 14px;
    font-style: italic;
    transition: transform 0.3s;
    width: 12px;
    text-align: center;
  }
  .cat-group.open .cat-toggle {
    transform: rotate(90deg);
    color: var(--gold);
  }

  .cat-items {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .cat-group.open .cat-items {
    max-height: 3000px;
  }

  .era-label {
    font-family: "Cormorant Garamond", "Source Han Serif SC", serif;
    font-style: italic;
    font-size: 11px;
    color: var(--gold-dim);
    letter-spacing: 0.18em;
    margin: 18px 36px 6px 18px;
    padding-bottom: 4px;
    border-bottom: 1px dashed var(--line);
    opacity: 0.75;
  }
  .cat-items > .era-label:first-child {
    margin-top: 8px;
  }
  .system-item {
    position: relative;
    padding: 10px 36px 10px 32px;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    font-size: 13px;
    color: var(--paper-dim);
    letter-spacing: 0.03em;
    line-height: 1.45;
  }
  .system-item::before {
    content: '';
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    width: 6px;
    height: 1px;
    background: var(--paper-darker);
    transition: all 0.3s;
  }
  .system-item:hover {
    color: var(--paper);
    padding-left: 36px;
  }
  .system-item:hover::before {
    width: 12px;
    background: var(--cinnabar);
  }
  .system-item.active {
    color: var(--paper);
    padding-left: 36px;
    font-weight: 500;
  }
  .system-item.active::before {
    width: 12px;
    background: var(--cinnabar);
    height: 2px;
  }

  /* ========== CONTENT AREA ========== */
  .content {
    padding: 56px 70px 100px;
    min-height: 800px;
    max-width: 1100px;
  }

  /* Hero */
  .system-hero {
    margin-bottom: 60px;
    padding-bottom: 38px;
    border-bottom: 1px solid var(--line);
  }
  .system-meta {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 22px;
  }
  .system-cat-tag {
    font-family: "Cinzel", serif;
    font-size: 10px;
    letter-spacing: 0.32em;
    color: var(--gold);
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--gold-dim);
    border-radius: 0;
    font-weight: 500;
  }
  .system-id {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 14px;
    color: var(--paper-dark);
    letter-spacing: 0.12em;
  }
  .system-name {
    font-size: 48px;
    color: var(--paper);
    letter-spacing: 0.04em;
    font-weight: 600;
    line-height: 1.18;
    margin-bottom: 16px;
  }
  .system-tagline {
    font-family: "Cormorant Garamond", "Source Han Serif SC", serif;
    font-style: italic;
    font-size: 19px;
    color: var(--paper-dim);
    letter-spacing: 0.05em;
    line-height: 1.5;
    max-width: 800px;
  }

  /* Preface */
  .preface {
    margin: 36px 0 56px;
    padding: 30px 36px;
    background: rgba(28,28,21,0.6);
    border-left: 2px solid var(--gold-dim);
    font-size: 16px;
    color: var(--paper-prose);
    line-height: 2.0;
    font-weight: 400;
    max-width: var(--reading-width);
  }
  .preface-label {
    font-family: "Cinzel", serif;
    font-size: 9px;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 18px;
    font-weight: 500;
  }
  .preface p {
    margin-bottom: 16px;
    text-indent: 2em;
  }
  .preface p:last-child { margin-bottom: 0; }
  .preface p:first-of-type { text-indent: 0; }
  .preface h4 {
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 0.05em;
    margin: 22px 0 10px;
    font-weight: 600;
    font-family: "Source Han Serif SC", "Noto Serif SC", serif;
  }

  /* Mother Paradox */
  .mother-paradox {
    margin: 56px 0 66px;
    padding: 56px 56px 50px;
    background: linear-gradient(180deg, rgba(216,83,60,0.04) 0%, rgba(28,28,21,0.4) 100%);
    border: 1px solid var(--line);
    position: relative;
  }
  .mother-paradox::before {
    content: '';
    position: absolute;
    top: -1px;
    left: -1px;
    width: 60px;
    height: 1px;
    background: var(--cinnabar);
  }
  .mother-paradox::after {
    content: '';
    position: absolute;
    bottom: -1px;
    right: -1px;
    width: 60px;
    height: 1px;
    background: var(--cinnabar);
  }
  .mp-label {
    margin-bottom: 36px;
  }
  .mp-label-en {
    font-family: "Cinzel", serif;
    font-size: 10px;
    letter-spacing: 0.45em;
    color: var(--cinnabar);
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .mp-label-cn {
    font-size: 13px;
    color: var(--paper-dim);
    letter-spacing: 0.12em;
    font-style: italic;
    font-family: "Cormorant Garamond", "Source Han Serif SC", serif;
  }

  .mp-stage {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 36px;
    align-items: stretch;
    margin: 36px 0 44px;
    min-height: 140px;
  }
  .mp-pole {
    padding: 28px 26px;
    border: 1px solid var(--line-strong);
    background: rgba(20,20,15,0.55);
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .mp-pole-a {
    border-left: 3px solid var(--jade);
  }
  .mp-pole-b {
    border-right: 3px solid var(--cinnabar);
    text-align: right;
  }
  .mp-pole-marker {
    position: absolute;
    top: 16px;
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 13px;
    color: var(--paper-dark);
    letter-spacing: 0.18em;
  }
  .mp-pole-a .mp-pole-marker { left: 26px; }
  .mp-pole-b .mp-pole-marker { right: 26px; }
  .mp-pole-text {
    font-size: 23px;
    line-height: 1.35;
    letter-spacing: 0.04em;
    margin-top: 22px;
    font-weight: 500;
  }
  .mp-pole-a .mp-pole-text { color: var(--jade-bright); }
  .mp-pole-b .mp-pole-text { color: var(--cinnabar); }

  .mp-tension {
    align-self: center;
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 56px;
    color: var(--gold);
    line-height: 1;
    text-align: center;
    opacity: 0.85;
  }

  .mp-description {
    font-size: 17px;
    color: var(--paper-prose);
    line-height: 2.05;
    text-align: justify;
    font-weight: 400;
    max-width: var(--reading-width);
    margin-top: 8px;
  }
  .mp-description p {
    margin-bottom: 18px;
    text-indent: 2em;
  }
  .mp-description p:last-child { margin-bottom: 0; }
  .mp-description h4 {
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 0.06em;
    margin: 26px 0 12px;
    font-weight: 600;
    font-family: "Source Han Serif SC", "Noto Serif SC", serif;
  }

  /* Tensions Section */
  .tensions-section {
    margin-top: 70px;
  }
  .section-heading {
    display: flex;
    align-items: baseline;
    gap: 22px;
    margin-bottom: 36px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--line);
  }
  .section-heading-cn {
    font-size: 24px;
    color: var(--paper);
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .section-heading-en {
    font-family: "Cormorant Garamond", "Source Han Serif SC", serif;
    font-style: italic;
    font-size: 15px;
    color: var(--paper-dark);
    letter-spacing: 0.04em;
    flex: 1;
  }
  .section-heading-count {
    font-family: "Cinzel", serif;
    font-size: 10px;
    letter-spacing: 0.32em;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 500;
  }

  .tensions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
  .tension-card {
    background: var(--ink-card);
    border: 1px solid var(--line);
    padding: 26px 26px 24px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    overflow: hidden;
  }
  .tension-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--jade) 0%, transparent 50%, var(--cinnabar) 100%);
    opacity: 0.35;
    transition: opacity 0.4s;
  }
  .tension-card:hover {
    border-color: var(--line-strong);
    transform: translateY(-2px);
    background: #20201a;
    box-shadow: 0 12px 28px var(--shadow-soft);
  }
  .tension-card:hover::before { opacity: 1; }

  .tc-num {
    display: flex;
    align-items: baseline;
    gap: 9px;
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    color: var(--paper-dark);
    margin-bottom: 16px;
    font-size: 17px;
  }
  .tc-num-label {
    font-family: "Cinzel", serif;
    font-style: normal;
    font-size: 9px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--paper-darker);
    font-weight: 500;
  }
  .tc-poles {
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-bottom: 14px;
  }
  .tc-pole {
    font-size: 15px;
    line-height: 1.42;
    letter-spacing: 0.03em;
    padding-left: 14px;
    position: relative;
    font-weight: 500;
  }
  .tc-pole::before {
    content: '';
    position: absolute;
    left: 0;
    top: 9px;
    width: 7px;
    height: 1px;
  }
  .tc-pole.a { color: var(--jade-bright); }
  .tc-pole.b { color: var(--cinnabar); }
  .tc-pole.a::before { background: var(--jade); }
  .tc-pole.b::before { background: var(--cinnabar); }

  .tc-vs {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 14px;
    color: var(--paper-darker);
    text-align: center;
    padding: 2px 0;
  }
  .tc-poles-single {
    padding: 8px 0;
  }
  .tc-pole-single {
    color: var(--gold);
    font-size: 15px;
    line-height: 1.45;
    letter-spacing: 0.04em;
    padding-left: 14px;
    position: relative;
    font-weight: 500;
  }
  .tc-pole-single::before {
    content: '';
    position: absolute;
    left: 0;
    top: 9px;
    width: 7px;
    height: 1px;
    background: var(--gold);
  }
  .tc-summary {
    margin-top: 14px;
    padding-top: 16px;
    border-top: 1px dashed var(--line);
    font-size: 13px;
    color: var(--paper-prose);
    line-height: 1.75;
    font-family: "Cormorant Garamond", "Source Han Serif SC", serif;
    font-style: italic;
    font-weight: 400;
    opacity: 0.85;
  }
  .tc-summary.tc-summary-heading {
    color: var(--gold);
    font-style: normal;
    font-family: "Source Han Serif SC", "Noto Serif SC", serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.03em;
    opacity: 1;
  }
  .tc-expand {
    display: inline-block;
    margin-top: 16px;
    font-family: "Cinzel", serif;
    font-size: 9px;
    letter-spacing: 0.32em;
    color: var(--paper-darker);
    text-transform: uppercase;
    transition: color 0.3s;
    font-weight: 500;
  }
  .tension-card:hover .tc-expand { color: var(--gold); }

  /* Meta Conclusion */
  .meta-conclusion {
    margin: 80px 0 50px;
    padding: 48px 56px;
    background: rgba(28,28,21,0.5);
    border: 1px solid var(--line);
    border-left: 3px solid var(--gold);
    position: relative;
  }
  .mc-title {
    font-family: "Cinzel", serif;
    font-size: 11px;
    letter-spacing: 0.45em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 24px;
    font-weight: 500;
  }
  .mc-text {
    font-size: 17px;
    color: var(--paper-prose);
    line-height: 2.05;
    text-align: justify;
    font-weight: 400;
    max-width: var(--reading-width);
  }
  .mc-text p {
    margin-bottom: 18px;
    text-indent: 2em;
  }
  .mc-text p:last-child { margin-bottom: 0; }
  .mc-text p:first-of-type { text-indent: 0; }
  .mc-text h4 {
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 0.06em;
    margin: 26px 0 12px;
    font-weight: 600;
    font-family: "Source Han Serif SC", "Noto Serif SC", serif;
  }

  /* Welcome state (no system selected) */
  .welcome {
    padding: 90px 60px;
    text-align: center;
    max-width: 920px;
    margin: 0 auto;
  }
  .welcome-mark {
    font-family: "Cinzel", serif;
    font-size: 11px;
    letter-spacing: 0.45em;
