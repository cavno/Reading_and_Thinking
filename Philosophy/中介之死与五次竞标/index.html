<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中介之死与五次竞标 · 近代哲学结构图</title>
<meta name="description" content="二分表为左列，笛卡尔到康德的标书为节点，康德的形式之桥收束——近代哲学=中介(神)之死后为二分寻找替代焊点的连续竞标。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=GFS+Didot&family=Noto+Serif+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --parchment:#f3ebda; --parchment-light:#faf4e6; --parchment-dark:#e8ddc6;
  --ink:#1c1916; --ink-soft:#3a342c; --ink-fade:#6e6253;
  --terracotta:#a73e2c; --terracotta-dark:#7e2d1f;
  --aegean:#1d4e5f; --gold:#b8893a; --purple:#6d4a8f; --green:#3f7a52; --grey:#8a7f6d;
  --line:rgba(28,25,22,.12); --line-strong:rgba(28,25,22,.26);
  --serif:"Noto Serif SC","Noto Serif CJK SC",Georgia,serif;
  --display:"Cormorant Garamond","Noto Serif SC",Georgia,serif;
  --greek:"GFS Didot","Noto Serif SC",Georgia,serif;
  --mono:"JetBrains Mono","Courier New",monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--parchment);
 background-image:radial-gradient(ellipse at top left,rgba(184,137,58,.06),transparent 50%),radial-gradient(ellipse at bottom right,rgba(29,78,95,.05),transparent 50%);
 color:var(--ink);font-family:var(--serif);font-size:16px;line-height:1.7;overflow:hidden;}
.app{height:100vh;display:flex;flex-direction:column;}
header{flex:none;border-bottom:1px solid var(--line);background:rgba(243,235,218,.93);backdrop-filter:blur(8px);padding:12px 22px 9px;}
.hbar{display:flex;align-items:baseline;gap:13px;flex-wrap:wrap;}
h1{font-family:var(--display);font-weight:600;font-size:23px;white-space:nowrap;}
.latin{font-family:var(--greek);font-size:11.5px;letter-spacing:.18em;color:var(--terracotta);text-transform:uppercase;}
.sub{font-size:12.5px;color:var(--ink-fade);}
.tools{margin-left:auto;display:flex;gap:8px;}
.btn{font-size:13px;color:var(--ink-soft);background:var(--parchment-light);border:1px solid var(--line-strong);border-radius:18px;padding:5px 13px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn:hover{border-color:var(--terracotta);color:var(--terracotta);}
.btn.on{background:var(--ink);color:var(--parchment-light);border-color:var(--ink);}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;font-size:11.5px;color:var(--ink-fade);}
.lg{display:inline-flex;align-items:center;gap:6px;}
.lg .ln{width:22px;height:0;display:inline-block;}
.ln.weld{border-top:2.2px solid var(--grey);}
.ln.fuse{border-top:2.4px solid var(--green);}
.ln.single{border-top:2.4px solid #cf3b2e;}
.ln.god{border-top:2.4px dotted var(--gold);}
.ln.part{border-top:2.4px solid var(--aegean);}
.ln.weave{border-top:2.4px solid var(--purple);}
.main{flex:1;display:flex;min-height:0;}
.mapwrap{flex:1;overflow:auto;padding:6px 4px 40px;}
.mapwrap svg{display:block;margin:0 auto;}
.panel{width:400px;flex:none;border-left:1px solid var(--line);background:var(--parchment-light);overflow-y:auto;padding:18px 22px 50px;}
.node,.dy{cursor:pointer;}
.dy rect{fill:var(--parchment-light);stroke:var(--line-strong);transition:all .18s;}
.dy:hover rect,.node:hover .nb{stroke:var(--terracotta);}
.dy .dl{fill:var(--aegean);font-weight:600;}
.dy .dr{fill:#a05537;font-weight:600;}
.dy .vs{fill:var(--ink-fade);font-family:var(--greek);font-style:italic;}
.grouplab{fill:var(--terracotta);font-family:var(--greek);letter-spacing:.16em;text-transform:uppercase;}
.nb{stroke-width:1.4;}
.node .nn{fill:#fff;font-weight:700;}
.node .nt{fill:rgba(255,255,255,.85);}
.node .nbid{font-weight:600;}
.edge{fill:none;stroke-linecap:round;transition:all .2s;}
.edge.weld{stroke:var(--grey);stroke-opacity:.30;stroke-width:1.2;}
.edge.fuse{stroke:var(--green);}
.edge.single{stroke:#cf3b2e;}
.edge.god{stroke:var(--gold);stroke-dasharray:2 5;}
.edge.part{stroke:var(--aegean);}
.edge.weave{stroke:var(--purple);}
.edge.act{stroke-opacity:.62;stroke-width:1.9;}
.dim{opacity:.10 !important;}
.dimE{stroke-opacity:.05 !important;}
.hlE{stroke-opacity:.95 !important;stroke-width:2.8 !important;}
.node.sel .nb{stroke:#fff;stroke-width:3;}
.dy.sel rect{stroke:var(--terracotta);stroke-width:2.6;}
.deathband{fill:rgba(167,62,44,.08);}
.deathlab{fill:var(--terracotta);font-weight:700;}
.eyebrow{font-family:var(--greek);font-size:11.5px;letter-spacing:.22em;color:var(--terracotta);text-transform:uppercase;margin-bottom:8px;}
.p-name{font-family:var(--display);font-size:24px;font-weight:600;line-height:1.2;}
.p-bid{font-size:14px;color:var(--ink-soft);font-style:italic;margin:4px 0 10px;}
.blk{border-radius:9px;padding:10px 12px;margin-bottom:10px;font-size:13.5px;line-height:1.68;}
.blk h4{font-family:var(--greek);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:5px;}
.blk.do{background:rgba(63,122,82,.09);border-left:3px solid var(--green);} .blk.do h4{color:var(--green);}
.blk.fail{background:rgba(167,62,44,.07);border-left:3px solid var(--terracotta);} .blk.fail h4{color:var(--terracotta);}
.blk.note{background:rgba(29,78,95,.06);border-left:3px solid var(--aegean);} .blk.note h4{color:var(--aegean);}
.p-label{font-family:var(--greek);font-size:11px;letter-spacing:.2em;color:var(--terracotta);text-transform:uppercase;margin:13px 0 8px;display:flex;align-items:center;gap:9px;}
.p-label::after{content:'';flex:1;height:1px;background:var(--line);}
.chips{display:flex;flex-wrap:wrap;}
.chip{font-size:12px;color:var(--ink-soft);background:var(--parchment);border:1px solid var(--line-strong);border-radius:14px;padding:3px 11px;margin:0 6px 8px 0;cursor:pointer;}
.chip:hover{border-color:var(--terracotta);color:var(--terracotta);}
.chip b{font-family:var(--mono);font-weight:500;margin-right:4px;}
.guide h3{font-family:var(--display);font-size:20px;font-weight:600;margin-bottom:10px;}
.guide p{font-size:13.5px;line-height:1.74;margin-bottom:10px;color:var(--ink-soft);}
.guide em{color:var(--terracotta);font-style:italic;} .guide strong{color:var(--ink);}
.guide .mini{font-size:12.5px;color:var(--ink-fade);}
@media(max-width:980px){body{overflow:auto;}.app{height:auto;}.main{flex-direction:column;}.panel{width:100%;border-left:none;border-top:1px solid var(--line);}.mapwrap{overflow:visible;}}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="hbar">
    <h1>中介之死与五次竞标</h1>
    <span class="latin">Mediator Mortuus · 近代哲学结构图</span>
    <span class="sub">左列＝二分表(碎片场)；右列＝为二分寻找替代焊点的连续竞标；康德的形式之桥收束</span>
    <div class="tools"><button class="btn" id="btnPlay">▶ 竞标顺演</button><button class="btn" id="btnReset">↺ 全览</button></div>
  </div>
  <div class="legend">
    <span class="lg"><span class="ln weld"></span>旧焊点(神的统一)</span>
    <span class="lg"><span class="ln fuse"></span>熔断为同一</span>
    <span class="lg"><span class="ln single"></span>单边裁决/拆解</span>
    <span class="lg"><span class="ln god"></span>请神垫板(后门担保)</span>
    <span class="lg"><span class="ln part"></span>划界·分治</span>
    <span class="lg"><span class="ln weave"></span>交织成结(先天综合)</span>
  </div>
</header>
<div class="main">
  <div class="mapwrap"><svg id="map" xmlns="http://www.w3.org/2000/svg"></svg></div>
  <aside class="panel" id="panel"></aside>
</div>
</div>
<script>
/* ===== 数据 ===== */
const DYADS=[
 {id:'d1',g:'本体论',l:'必然性',r:'自由意志'},
 {id:'d2',g:'本体论',l:'神圣·无限上帝',r:'世俗·有限现世'},
 {id:'d3',g:'本体论',l:'超自然(奇迹)',r:'自然(自然法)'},
 {id:'d4',g:'本体论',l:'灵魂·目的因',r:'形体·动力因'},
 {id:'d5',g:'本体论',l:'形而上界·物自体',r:'经验界·现象'},
 {id:'d6',g:'本体论',l:'唯实(共相实在)',r:'唯名'},
 {id:'d8',g:'认识论',l:'逻辑必然',r:'经验或然'},
 {id:'d9',g:'认识论',l:'天赋观念·先天',r:'感觉印象·后天'},
 {id:'d10',g:'认识论',l:'因果必然',r:'心理联想·习惯'},
 {id:'d11',g:'认识论',l:'观念关系的知识',r:'事实存在的知识'},
 {id:'d12',g:'价值',l:'是(事实)',r:'应当(价值)'},
 {id:'d13',g:'价值',l:'理性',r:'情感'},
];
const BIDS=[
 {id:'god',name:'旧中介 · 神',bid:'命运→上帝：三大法则统一',c:'#8a7f6d',era:'中世纪',
  do:'天国、自然法、君权神授、个体救赎、真理——全部挂在同一枚钉子上。每对二分的两端之间都坐着同一个中介：神圣贯通世俗，无限担保有限，灵魂统摄形体，信仰先于理性。此时二分并不构成问题。',
  fail:'科学革命抽走自然学半边：奇迹逐出自然(超自然/自然裂开)、目的因逐出物体(灵魂/形体裂开)——知识确定性的旧担保人被撤职，主体被迫自己审计认识仪器。「防无穷倒退·阿基米德点」成为头号工程。'},
 {id:'des',name:'笛卡尔',bid:'标书①：我思(良性自指) ＋ 诚实的上帝',c:'#1d4e5f',era:'1637–1644',
  do:'普遍怀疑＝拿「逻辑必然/经验或然」当筛子，凡或然尽弃；筛到底剩「我思」——怀疑行为自证怀疑者在，支点是一次无法自我取消的行为(与说谎者同构而反向)。',
  fail:'支点只救「我在」救不了「世界在」：思如何够得着物？答曰清楚分明为真——因为诚实的上帝不欺骗。被科学革命逐出自然的神，从认识论后门被请回当担保人；目的因/动力因的裂缝被铸成心物二元本体——「必然/自由」从此成为贯穿每个人身体的断层线。'},
 {id:'spi',name:'斯宾诺莎',bid:'标书②：实体同一(神即自然)',c:'#3f7a52',era:'1677',
  do:'把二分直接焊死为同一：神即自然——「神圣/世俗」「无限/有限」在唯一实体里熔断；心与物降为同一实体的两种属性，平行而不交互。',
  fail:'代价立刻显形：必然吞掉自由，自由被重新定义为「对必然性的认识」；平行论无法解释心理与物理为何精准对应(缺因果联结)；一元实体如何分化出无限属性与有限样式——一与多难题原地复发。'},
 {id:'lei',name:'莱布尼茨',bid:'标书③：前定和谐(神为程序员) ＋ 充足理由律',c:'#b8893a',era:'1714',
  do:'实体多元化为单子，统一交给前定和谐——神从担保人升格为程序员；把「逻辑必然/经验或然」建制化为推理真理/事实真理；充足理由律立为独立公理——防无穷倒退的正面立法。',
  fail:'单子无窗却表象全宇宙，内在表象的客观依据无解；前定和谐无法脱离神学前提；「最好的可能世界」挡不住里斯本地震。独断论的病理定型：无法证明「理性结构＝世界结构」——能作此担保的只有那位已被撤职的神。'},
 {id:'loc',name:'洛克',bid:'标书④：经验白板 ＋ 实体基质(残余)',c:'#a05537',era:'1690',
  do:'换到二分另一极：白板说处决天赋观念(「天赋/感觉」单边裁决——唯实/唯名之争的近代续集：共相再判为名)；第一/第二性质之分是「物自体/现象」的胚胎。',
  fail:'温和的代价：留下不可知的「实体基质」这块形而上残余，且自相矛盾(不可知却断言其在)；无法解释数学与逻辑之普遍必然性的来源——给唯理论留下百年靶心。'},
 {id:'ber',name:'贝克莱',bid:'标书⑤：上帝的永恒感知',c:'#6d4a8f',era:'1710',
  do:'用经验论自己的刀砍洛克的残余：凡不可感知者不得设定——物质实体消解为感知集合(存在即被感知)；唯名论一路杀到底。',
  fail:'世界无人看时为何还在？引入上帝作永恒感知者——与笛卡尔同一个结构动作：桥塌处请神垫板。且否定物质实体却独断保留精神实体，休谟随即指出这违背其自身经验原则。'},
 {id:'hum',name:'休谟',bid:'弃标声明：只剩习惯(诚实破产)',c:'#7e2d1f',era:'1739–1748',
  do:'同一把经验之刀拆到底：自我实体→知觉束；因果→先后相随＋习惯联想；知识劈成观念关系/事实存在——前者必然而空转、后者扩展而或然；再劈开是/应当(Physis/Nomos 的近代回声)。',
  fail:'「或然」一极吃掉「必然」一极：科学的普遍必然性失去哲学地基，形而上学全部命题被判空洞。两极对称的失败至此写全：唯理论纯化必然→独断；经验论纯化或然→怀疑——单极居住本身不可能。'},
 {id:'kan',name:'康德 · 中标',bid:'形式之桥：对象符合主体先天形式',c:'#a73e2c',era:'1781–1790',
  do:'担保人从对象一侧搬到主体一侧——契合被制造出来，故无需神。先天综合判断把两栏织成一个结：「先天」取自必然列、「综合」取自经验列；「现象/物自体」改写为权限边界(可思≠可认识)；「必然/自由」分治：必然归现象界(第一批判)、自由归道德自我立法(第二批判)、审美架桥(第三批判)——三大法则的分裂被建制化承认。支点换型：不再是实体(我思/上帝/物质)，而是形式(先验统觉与范畴)——回溯停在可能性条件上，第一种不需要神的解法。',
  fail:'遗留标的：物自体既不可知何以断言其在；二元割裂仅以审美为桥；定言命令形式空洞；先天综合判断的地位在二十世纪被重新起诉——德国观念论与现代哲学的下一轮竞标由此开标。'},
];
/* 边: [bid, dyad, type, label] */
const EDGES=[
 ['god','d1','weld'],['god','d2','weld'],['god','d3','weld'],['god','d4','weld'],['god','d5','weld'],['god','d6','weld'],['god','d8','weld'],['god','d9','weld'],['god','d10','weld'],['god','d11','weld'],['god','d12','weld'],['god','d13','weld'],
 ['des','d8','single','用作怀疑之筛'],['des','d4','single','铸成心物二元'],['des','d5','god','诚实上帝担保契合'],
 ['spi','d2','fuse','神即自然·熔断'],['spi','d1','fuse','自由=对必然的认识'],['spi','d4','fuse','两属性平行'],
 ['lei','d8','part','推理真理/事实真理'],['lei','d1','god','前定和谐'],['lei','d10','god','充足理由律立法'],
 ['loc','d9','single','白板处决天赋'],['loc','d6','single','唯名续集'],['loc','d5','part','第一/二性质=胚胎'],
 ['ber','d5','single','物质实体消解'],['ber','d3','god','上帝永恒感知'],
 ['hum','d10','single','因果→习惯'],['hum','d11','single','双叉劈开'],['hum','d12','single','是推不出应当'],['hum','d13','single','理性是激情之奴'],
 ['kan','d9','weave','先天综合判断'],['kan','d8','weave','必然×经验成结'],['kan','d5','part','权限边界:可思≠可认识'],['kan','d1','part','必然归现象/自由归立法'],['kan','d12','part','实践理性自我立法'],
];
/* ===== 布局 ===== */
const W=980, DX=40, DW=270, DH=46, DGAP=12, TOP=64;
const BX=560, BW=330, BH=86, BGAP=26;
const box={};
let y=TOP; let lastG='';
const glabels=[];
DYADS.forEach(d=>{ if(d.g!==lastG){ glabels.push({g:d.g,y:y+4}); y+=22; lastG=d.g; }
 box[d.id]={x:DX,y:y,w:DW,h:DH,cy:y+DH/2}; y+=DH+DGAP; });
const leftBottom=y;
let by=TOP-6;
BIDS.forEach((b,i)=>{ box[b.id]={x:BX,y:by,w:BW,h:BH,cy:by+BH/2}; by+=BH+BGAP; if(i===0) by+=34; /* death band gap */ });
const H=Math.max(leftBottom,by)+20;
function epath(f,t){const a=box[f],b=box[t];const x1=a.x,y1=a.cy,x2=b.x+b.w,y2=b.cy;const mx=(x1+x2)/2;return `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;}
/* ===== 渲染 ===== */
function build(){
 const svg=document.getElementById('map');
 svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.setAttribute('width',W);svg.setAttribute('height',H);
 let s='';
 glabels.forEach(g=>{s+=`<text class="grouplab" x="${DX}" y="${g.y}" font-size="11">${g.g} · 二分</text>`;});
 // death band between god and descartes
 const g0=box['god'],g1=box['des'];
 const dy0=g0.y+BH+4, dh=g1.y-dy0-4;
 s+=`<rect class="deathband" x="${BX-14}" y="${dy0}" width="${BW+28}" height="${dh}" rx="8"/>`;
 s+=`<text class="deathlab" x="${BX+BW/2}" y="${dy0+dh/2+5}" font-size="13.5" text-anchor="middle">✂ 中介之死：科学革命抽走担保人 → 「防无穷倒退·阿基米德点」开标</text>`;
 EDGES.forEach(([f,t,k,lab])=>{ s+=`<path class="edge ${k} ${k==='weld'?'':'act'}" data-f="${f}" data-t="${t}" d="${epath(t,f)}"/>`; });
 DYADS.forEach(d=>{const b=box[d.id];
  s+=`<g class="dy" data-id="${d.id}" tabindex="0"><title>${d.l} / ${d.r}</title>`+
   `<rect x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}" rx="9"/>`+
   `<text class="dl" x="${b.x+12}" y="${b.y+29}" font-size="13.5">${d.l}</text>`+
   `<text class="vs" x="${b.x+b.w/2}" y="${b.y+29}" font-size="10" text-anchor="middle"> </text>`+
   `<text class="dr" x="${b.x+b.w-12}" y="${b.y+29}" font-size="13.5" text-anchor="end">${d.r}</text>`+
   `<line x1="${b.x+b.w/2}" y1="${b.y+10}" x2="${b.x+b.w/2}" y2="${b.y+b.h-10}" stroke="rgba(28,25,22,.22)" stroke-dasharray="2 3"/></g>`;});
 BIDS.forEach((n,i)=>{const b=box[n.id];
  s+=`<g class="node" data-id="${n.id}" tabindex="0"><title>${n.name}</title>`+
   `<rect class="nb" x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}" rx="12" fill="${n.c}" stroke="${n.c}"/>`+
   `<text class="nn" x="${b.x+16}" y="${b.y+27}" font-size="16.5">${n.name}</text>`+
   `<text class="nt" x="${b.x+b.w-14}" y="${b.y+27}" font-size="11" text-anchor="end">${n.era}</text>`+
   `<text class="nt nbid" x="${b.x+16}" y="${b.y+52}" font-size="12.5">${n.bid.length>26?n.bid.slice(0,26)+'…':n.bid}</text>`+
   `<text class="nt" x="${b.x+16}" y="${b.y+72}" font-size="10.5" opacity=".75">${i===0?'一切二分尚未成为问题':(i===BIDS.length-1?'第一种不需要神的解法':'点开看标书 · 动作 · 败因')}</text></g>`;});
 svg.innerHTML=s;
 svg.querySelectorAll('.node').forEach(n=>n.addEventListener('click',()=>selBid(n.dataset.id)));
 svg.querySelectorAll('.dy').forEach(n=>n.addEventListener('click',()=>selDy(n.dataset.id)));
}
/* ===== 交互 ===== */
const BY={},DY={};BIDS.forEach(b=>BY[b.id]=b);DYADS.forEach(d=>DY[d.id]=d);
const TYPELAB={weld:'旧焊点',fuse:'熔断为同一',single:'单边裁决/拆解',god:'请神垫板',part:'划界·分治',weave:'交织成结'};
function svg(){return document.getElementById('map');}
function clearAll(){svg().querySelectorAll('.node,.dy').forEach(n=>n.classList.remove('dim','sel'));svg().querySelectorAll('.edge').forEach(e=>e.classList.remove('dimE','hlE'));}
function selBid(id){
 clearAll();stopPlay(false);
 const touched=new Set([id]);EDGES.forEach(([f,t])=>{if(f===id)touched.add(t);});
 svg().querySelectorAll('.node').forEach(n=>{if(n.dataset.id===id)n.classList.add('sel');else n.classList.add('dim');});
 svg().querySelectorAll('.dy').forEach(n=>{if(!touched.has(n.dataset.id))n.classList.add('dim');});
 svg().querySelectorAll('.edge').forEach(e=>{if(e.dataset.f===id)e.classList.add('hlE');else e.classList.add('dimE');});
 const b=BY[id];
 const chips=EDGES.filter(x=>x[0]===id).map(([f,t,k,lab])=>`<span class="chip" data-t="${t}"><b style="color:${b.c}">${TYPELAB[k]}</b>${DY[t].l}／${DY[t].r}${lab?('：'+lab):''}</span>`).join('');
 document.getElementById('panel').innerHTML=`
  <div class="eyebrow">${id==='god'?'旧秩序':'标书'} · ${b.era}</div>
  <div class="p-name">${b.name}</div>
  <div class="p-bid">${b.bid}</div>
  <div class="blk do"><h4>动作 · 它如何焊接</h4>${b.do}</div>
  <div class="blk fail"><h4>${id==='kan'?'遗留标的 · 下一轮开标':'败因 · 为何流标'}</h4>${b.fail}</div>
  <div class="p-label">触及的二分</div><div class="chips">${chips||'—'}</div>`;
 wire();
}
function selDy(id){
 clearAll();stopPlay(false);
 const touch=EDGES.filter(x=>x[1]===id);
 const bids=new Set(touch.map(x=>x[0]));
 svg().querySelectorAll('.dy').forEach(n=>{if(n.dataset.id===id)n.classList.add('sel');else n.classList.add('dim');});
 svg().querySelectorAll('.node').forEach(n=>{if(!bids.has(n.dataset.id))n.classList.add('dim');});
 svg().querySelectorAll('.edge').forEach(e=>{if(e.dataset.t===id)e.classList.add('hlE');else e.classList.add('dimE');});
 const d=DY[id];
 const rows=touch.map(([f,,k,lab])=>`<span class="chip" data-b="${f}"><b style="color:${BY[f].c}">${BY[f].name}</b>${TYPELAB[k]}${lab?('：'+lab):''}</span>`).join('');
 document.getElementById('panel').innerHTML=`
  <div class="eyebrow">二分 · ${d.g}</div>
  <div class="p-name" style="font-size:21px">${d.l} ／ ${d.r}</div>
  <div class="blk note"><h4>命运时间线</h4>中世纪由神焊接(灰线)；此后每份标书对它的处置见下——同一对二分被反复熔断、裁决、垫板、划界，直到康德给出不需要神的方案(或把它建制化为边界)。</div>
  <div class="p-label">各标书的处置</div><div class="chips">${rows||'仅由旧中介焊接，竞标中未被单独处理。'}</div>`;
 wire();
}
function wire(){document.getElementById('panel').querySelectorAll('[data-t]').forEach(c=>c.addEventListener('click',()=>selDy(c.dataset.t)));
 document.getElementById('panel').querySelectorAll('[data-b]').forEach(c=>c.addEventListener('click',()=>selBid(c.dataset.b)));}
function guide(){document.getElementById('panel').innerHTML=`<div class="guide">
 <div class="eyebrow">导读 · LECTORI</div><h3>一场竞标，七份标书</h3>
 <p>左列是核心概念稿里的<strong>二分表</strong>——它不是并列的知识点，而是<em>同一次断裂的碎片场</em>：中世纪时每对二分都由同一个中介(神)焊接(灰线)，故尚不构成问题。</p>
 <p>科学革命抽走担保人(红色剪断带)，「<strong>防无穷倒退 · 阿基米德点</strong>」开标。右列七个节点＝七份标书：笛卡尔投「诚实的上帝」，斯宾诺莎投「实体同一」，莱布尼茨投「前定和谐＋充足理由律」，洛克投「白板＋实体残余」，贝克莱投「上帝的感知」，休谟<em>弃标</em>(只剩习惯)，康德中标：「<strong>先验主体的形式</strong>」——第一种不需要神的解法。</p>
 <p class="mini">连线五色＝五种焊法：<span style="color:var(--green)">熔断为同一</span> / <span style="color:#cf3b2e">单边裁决</span> / <span style="color:var(--gold)">请神垫板(后门)</span> / <span style="color:var(--aegean)">划界分治</span> / <span style="color:var(--purple)">交织成结(先天综合判断)</span>。点任一标书看「动作·败因」；点任一二分看它被历次标书处置的时间线；▶ 顺演从旧秩序播到康德。</p>
 <p class="mini" style="border-top:1px solid var(--line);padding-top:9px">深一层：「防无穷倒退」即充足理由律的诉求——我思是 PSR 的良性自指解，莱布尼茨为 PSR 立法，休谟锯断它，康德给它划界。这段历史是四律中第四根梁在失去神学地基后的连续受力。</p></div>`;}
let pt=null,pk=0;
function play(){stopPlay(false);pk=0;document.getElementById('btnPlay').classList.add('on');step();pt=setInterval(()=>{pk++;if(pk>=BIDS.length){stopPlay(true);return;}step();},2400);}
function step(){selBid(BIDS[pk].id);document.getElementById('btnPlay').classList.add('on');}
function stopPlay(reset){if(pt){clearInterval(pt);pt=null;}document.getElementById('btnPlay').classList.remove('on');}
build();guide();
document.getElementById('btnPlay').addEventListener('click',()=>{if(pt)stopPlay(true);else play();});
document.getElementById('btnReset').addEventListener('click',()=>{stopPlay(true);clearAll();guide();});
</script>
</body>
</html>
